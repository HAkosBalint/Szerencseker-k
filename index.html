<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Abul-Akbar Szerencsekereke - S&F Edition</title>
    <style>
        body { 
            background: #1a0f0a url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            color: #f2e3c9; 
            font-family: 'Times New Roman', serif; 
            text-align: center; 
            margin: 0; padding: 20px;
        }

        .main-container {
            background: #dcc296 url('https://www.transparenttextures.com/patterns/beige-paper.png');
            border: 8px solid #3e2723;
            border-radius: 10px;
            display: inline-block;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            margin-top: 20px;
            color: #3e2723;
        }

        h1 { font-variant: small-caps; color: #5d4037; text-shadow: 1px 1px 0px #fff; margin-top: 0; }

        .container { position: relative; display: inline-block; margin: 20px 0; }

        canvas { 
            border: 12px solid #3e2723; 
            border-radius: 50%; 
            box-shadow: 0 0 20px #000;
            background: #5d4037;
            animation: slow-spin 30s linear infinite;
        }

        @keyframes slow-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning {
            animation: none !important;
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1) !important;
        }

        .pointer {
            position: absolute; top: 50%; right: -25px; transform: translateY(-50%);
            width: 0; height: 0; 
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent; 
            border-right: 40px solid #d4af37; 
            z-index: 10;
        }

        button { 
            background: linear-gradient(to bottom, #8b5a2b 0%, #4e342e 100%);
            border: 3px solid #d4af37; 
            color: #f2e3c9; 
            padding: 15px 40px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 5px; 
            text-shadow: 2px 2px 2px #000;
            box-shadow: 0 4px 0 #2e1a12;
            transition: 0.1s;
        }
        button:hover { background: linear-gradient(to bottom, #a06a3a 0%, #5d4037 100%); }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #2e1a12; }
        button:disabled { background: #555; border-color: #777; cursor: not-allowed; opacity: 0.6; }

        input { 
            background: #fdf5e6; 
            border: 2px solid #5d4037; 
            padding: 12px; 
            font-size: 18px; 
            color: #3e2723;
            border-radius: 4px;
            width: 280px;
            margin-bottom: 15px;
            outline: none;
        }

        #prizeModal {
            display: none; position: fixed; z-index: 200; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: #dcc296 url('https://www.transparenttextures.com/patterns/beige-paper.png');
            margin: 15% auto; padding: 40px; 
            border: 6px solid #5d4037; width: 300px; border-radius: 10px; 
            text-align: center; box-shadow: 0 0 50px #000;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>🎡 Szerencsekerék</h1>
        <p>Vitéz, add meg a neved a hősök könyvébe!</p>
        
        <input type="text" id="username" placeholder="Hős neve..."><br>
        
        <div class="container">
            <div class="pointer"></div> 
            <canvas id="wheel" width="450" height="450"></canvas>
        </div>

        <br>
        <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    </div>

    <div id="prizeModal">
        <div class="modal-content">
            <h2 style="color:#5d4037">Gratulálok, vitéz!</h2>
            <p id="modalPrizeText" style="font-size: 24px; font-weight: bold;"></p>
            <button onclick="closeModal()">RENDBEN</button>
        </div>
    </div>

    <script>
        const prizes = ["🍄 5 Gomba", "💰 1000 Arany", "💀 Balszerencse", "🍄 10 Gomba", "🛡️ Új Rang", "🍻 Egy sör", "💎 Drágakő", "⚔️ Fegyver"];
        const colors = ["#4e342e", "#8b0000", "#3e2723", "#d4af37", "#4e342e", "#8b0000", "#3e2723", "#d4af37"];
        
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let lastPrizeIndex = -1;

        // BÖNGÉSZŐ ALAPÚ HANG GENERÁTOR
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); // Halk pittyenés
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath(); ctx.fillStyle = colors[i];
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.strokeStyle = "#f2e3c9"; ctx.lineWidth = 2; ctx.stroke();
                ctx.save();
                ctx.fillStyle = "#fff"; ctx.font = "bold 16px serif";
                ctx.textAlign = "right"; ctx.translate(225, 225);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(prizes[i], 210, 5); ctx.restore();
            }
        }

        // FOLYAMATOS FIGYELÉS (Alapforgáshoz és pörgéshez is)
        function checkRotation() {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            const adjustedAngle = (angle < 0 ? angle + 360 : angle);
            const prizeIndex = Math.floor(((360 - adjustedAngle) / (360 / prizes.length))) % prizes.length;

            if (prizeIndex !== lastPrizeIndex) {
                // Csak akkor szólal meg, ha már aktiválva van a hangrendszer (kattintottál)
                if (audioCtx.state === 'running') {
                    playClick();
                }
                lastPrizeIndex = prizeIndex;
            }
            requestAnimationFrame(checkRotation);
        }

        // HANG FELÉBRESZTÉSE ELSŐ KATTINTÁSRA
        document.body.addEventListener('click', function() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Hősök könyvéhez név kell!");
            
            const spinBtn = document.getElementById("spinBtn");
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
            
            spinBtn.disabled = true;
            canvas.style.animation = "none";
            canvas.style.transform = `rotate(${currentAngle}deg)`;
            void canvas.offsetWidth; 

            setTimeout(() => {
                canvas.classList.add("spinning");
                const spinDeg = Math.floor(Math.random() * 360) + 3600; 
                const finalRotation = currentAngle + spinDeg;
                canvas.style.transform = `rotate(${finalRotation}deg)`;

                setTimeout(() => {
                    const finalStyle = window.getComputedStyle(canvas);
                    const finalMatrix = new WebKitCSSMatrix(finalStyle.transform);
                    const finalAngle = Math.atan2(finalMatrix.b, finalMatrix.a) * (180 / Math.PI);
                    const adjustedFinalAngle = (finalAngle < 0 ? finalAngle + 360 : finalAngle);
                    const prizeIndex = Math.floor(((360 - (adjustedFinalAngle % 360)) / (360 / prizes.length))) % prizes.length;
                    const winnerPrize = prizes[prizeIndex];
                    
                    document.getElementById("modalPrizeText").innerText = winnerPrize;
                    document.getElementById("prizeModal").style.display = "block";
                    
                    sendToGoogleSheet(user, winnerPrize);
                    spinBtn.disabled = false;
                }, 5000);
            }, 10);
        }

        function closeModal() {
            document.getElementById("prizeModal").style.display = "none";
            canvas.classList.remove("spinning");
            canvas.style.transform = ""; 
            void canvas.offsetWidth;
            canvas.style.animation = "slow-spin 30s linear infinite";
        }

        function sendToGoogleSheet(user, prize) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const params = new URLSearchParams();
            params.append("entry.1569039722", user); 
            params.append("entry.916111113", prize); 

            fetch(formURL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString()
            });
        }

        window.onload = function() {
            drawWheel();
            requestAnimationFrame(checkRotation);
        };
    </script>
</body>
</html>
