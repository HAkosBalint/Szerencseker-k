<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Abul-Akbar Szerencsekereke</title>
    <style>
        body { 
            background: #1a0f0a url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            color: #f2e3c9; font-family: 'Times New Roman', serif; text-align: center; margin: 0; padding: 20px;
        }
        .main-container {
            background: #dcc296 url('https://www.transparenttextures.com/patterns/beige-paper.png');
            border: 8px solid #3e2723; border-radius: 10px; display: inline-block; padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9); margin-top: 20px; color: #3e2723;
        }
        .container { position: relative; display: inline-block; margin: 20px 0; }
        canvas { 
            border: 15px solid #3e2723; border-radius: 50%; background: #4e342e;
            animation: slow-spin 40s linear infinite;
        }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: none !important; transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1) !important; }
        .pointer {
            position: absolute; top: 50%; right: -30px; transform: translateY(-50%);
            width: 0; height: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; 
            border-right: 50px solid #d4af37; z-index: 10;
        }
        button { 
            background: linear-gradient(to bottom, #8b5a2b 0%, #4e342e 100%); border: 3px solid #d4af37; 
            color: #f2e3c9; padding: 15px 45px; font-size: 24px; font-weight: bold; cursor: pointer; 
            border-radius: 5px; text-shadow: 2px 2px 2px #000; box-shadow: 0 5px 0 #2e1a12;
        }
        input { background: #fdf5e6; border: 2px solid #5d4037; padding: 12px; font-size: 18px; width: 300px; }
        #prizeModal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #dcc296; margin: 15% auto; padding: 40px; border: 8px solid #5d4037; width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>🎡 Szerencsekerék</h1>
        <input type="text" id="username" placeholder="Hős neve..." autocomplete="off"><br>
        <div class="container">
            <div class="pointer"></div> 
            <canvas id="wheel" width="480" height="480"></canvas>
        </div><br>
        <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    </div>

    <div id="prizeModal">
        <div class="modal-content">
            <h2 style="color:#5d4037">Gratulálok, vitéz!</h2>
            <p id="modalPrizeText" style="font-size: 28px; font-weight: bold; color: #8b0000;"></p>
            <button onclick="closeModal()">RENDBEN</button>
        </div>
    </div>

    <script>
        const prizes = ["5 Gomba", "1000 Arany", "Balszerencse", "10 Gomba", "Uj Rang", "Egy sor", "Dragako", "Fegyver"];
        const colors = ["#5d4037", "#8b5a2b", "#3e2723", "#d4af37", "#5d4037", "#8b0000", "#3e2723", "#a67b5b"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let lastPrizeIndex = -1;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(450, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(240, 240);
                ctx.arc(240, 240, 240, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.strokeStyle = "#2e1a12"; ctx.lineWidth = 3;
                ctx.translate(240, 240); ctx.rotate(i * arc); ctx.beginPath(); ctx.moveTo(0, 0);
                for (let r = 20; r <= 240; r += 20) ctx.lineTo(r, (Math.random() - 0.5) * 5);
                ctx.stroke(); ctx.restore();
                ctx.save(); ctx.fillStyle = "#fff"; ctx.font = "bold 18px serif";
                ctx.textAlign = "right"; ctx.translate(240, 240);
                ctx.rotate(i * arc + arc / 2); ctx.fillText(prizes[i], 220, 8); ctx.restore();
            }
        }

        function checkRotation() {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            const adj = (angle < 0 ? angle + 360 : angle);
            const idx = Math.floor(((360 - adj) / (360 / prizes.length))) % prizes.length;
            if (idx !== lastPrizeIndex) { if (audioCtx.state === 'running') playClick(); lastPrizeIndex = idx; }
            requestAnimationFrame(checkRotation);
        }

        document.body.addEventListener('click', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Hős, add meg a neved!");
            const spinBtn = document.getElementById("spinBtn");
            spinBtn.disabled = true;
            canvas.classList.add("spinning");
            const deg = Math.floor(Math.random() * 360) + 3600;
            canvas.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                const idx = Math.floor(((360 - (deg % 360)) / (360 / prizes.length))) % prizes.length;
                const win = prizes[idx];
                document.getElementById("modalPrizeText").innerText = win;
                document.getElementById("prizeModal").style.display = "block";
                sendToGoogleSheet(user, win);
                spinBtn.disabled = false;
            }, 5000);
        }

        function sendToGoogleSheet(user, prize) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const iframe = document.createElement("iframe");
            iframe.name = "hidden_frame"; iframe.style.display = "none";
            document.body.appendChild(iframe);
            const form = document.createElement("form");
            form.target = "hidden_frame"; form.method = "POST"; form.action = formURL;
            
            const n = document.createElement("input"); n.name = "entry.1569039722"; n.value = user; form.appendChild(n);
            const p = document.createElement("input"); p.name = "entry.916111113"; p.value = prize; form.appendChild(p);
            
            document.body.appendChild(form);
            form.submit();
            setTimeout(() => { document.body.removeChild(form); document.body.removeChild(iframe); }, 2000);
        }

        function closeModal() {
            document.getElementById("prizeModal").style.display = "none";
            canvas.classList.remove("spinning"); canvas.style.transform = "rotate(0deg)";
            canvas.style.animation = "slow-spin 40s linear infinite";
        }

        window.onload = () => { drawWheel(); requestAnimationFrame(checkRotation); };
    </script>
</body>
</html>
