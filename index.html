<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szerencsekerék - Discord</title>
    <style>
        body { 
            background: #1a0f0a; 
            color: #f2e3c9; font-family: 'Times New Roman', serif; text-align: center; padding: 20px;
        }

        /* Sima szélű pergamen */
        .main-container {
            background: #dcc296;
            display: inline-block;
            padding: 40px 60px;
            border-radius: 10px;
            color: #3e2723;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border: 1px solid #5d4037;
        }

        .container { position: relative; display: inline-block; margin: 20px 0; }
        
        /* KERÉK STÍLUS ÉS ANIMÁCIÓ */
        #wheel { 
            border: 12px solid #3e2723; 
            border-radius: 50%; 
            background: #4e342e;
            /* Alap állapotban lassú forgás */
            animation: slow-spin 30s linear infinite;
        }

        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Amikor pörgetünk, ezt az osztályt adjuk hozzá JS-ből */
        .fast-spin {
            animation: none !important;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1) !important;
        }

        .pointer {
            position: absolute; top: 50%; right: -30px; transform: translateY(-50%);
            width: 0; height: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; 
            border-right: 55px solid #d4af37; z-index: 10;
        }

        button { 
            background: linear-gradient(to bottom, #8b5a2b 0%, #4e342e 100%); 
            border: 3px solid #d4af37; color: #f2e3c9; padding: 15px 45px; 
            font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 8px;
            text-shadow: 2px 2px 2px #000; margin-top: 20px;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        input { 
            padding: 12px; width: 280px; text-align: center; font-size: 18px; 
            border: 2px solid #5d4037; border-radius: 5px; background: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Szerencsekerék</h1>
        <input type="text" id="username" placeholder="Discord neved..." autocomplete="off"><br>
        
        <div class="container">
            <div class="pointer"></div> 
            <canvas id="wheel" width="450" height="450"></canvas>
        </div><br>
        
        <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS!</button>
    </div>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <script>
        const prizes = ["5 Gomba", "1000 Arany", "Balszerencse", "10 Gomba", "Új Rang", "Egy sör", "Drágakő", "Fegyver"];
        const colors = ["#5d4037", "#8b5a2b", "#3e2723", "#d4af37", "#5d4037", "#8b0000", "#3e2723", "#a67b5b"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let currentRotation = 0;

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.fillStyle = "#fff"; ctx.font = "bold 17px serif";
                ctx.textAlign = "right"; ctx.translate(225, 225);
                ctx.rotate(i * arc + arc / 2); ctx.fillText(prizes[i], 215, 6);
                ctx.restore();
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Kérlek, add meg a neved!");

            const today = new Date().toISOString().slice(0, 10);
            if (localStorage.getItem("spin_" + user.toLowerCase()) === today) {
                return alert("Vitéz! Ma már próbáltad a szerencséd.");
            }

            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            // 1. Elmentjük, hol állt a kerék az alapforgásban
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const startAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180/Math.PI));
            
            // 2. Átváltunk pörgetés módba
            canvas.classList.add("fast-spin");
            const extraRotation = 3600 + Math.floor(Math.random() * 360);
            currentRotation = startAngle + extraRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const finalAngle = currentRotation % 360;
                // Kiszámítjuk melyik szeletnél állt meg (a pointer jobbra van, 0 foknál)
                const idx = Math.floor(((360 - (finalAngle < 0 ? finalAngle + 360 : finalAngle)) / (360 / prizes.length))) % prizes.length;
                const win = prizes[idx];
                
                alert("Gratulálunk! Nyereményed: " + win);
                localStorage.setItem("spin_" + user.toLowerCase(), today);
                
                // ADATKÜLDÉS
                sendToForm(user, win);
                
                // Visszaállítjuk a gombot, de a kerék marad ott ahol megállt
                btn.disabled = false;
                canvas.classList.remove("fast-spin");
                canvas.style.transform = `rotate(${currentRotation % 360}deg)`;
            }, 5000);
        }

        function sendToForm(user, prize) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const form = document.createElement("form");
            form.target = "hidden_iframe"; form.method = "POST"; form.action = formURL;
            
            // Discord név
            const nameInput = document.createElement("input");
            nameInput.type = "hidden"; nameInput.name = "entry.1569039722"; nameInput.value = user;
            form.appendChild(nameInput);
            
            // Nyeremény
            const prizeInput = document.createElement("input");
            prizeInput.type = "hidden"; prizeInput.name = "entry.916111113"; prizeInput.value = prize;
            form.appendChild(prizeInput);
            
            document.body.appendChild(form);
            form.submit();
            setTimeout(() => document.body.removeChild(form), 1000);
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
