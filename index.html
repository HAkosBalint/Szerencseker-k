<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Abul-Akbar Szerencsekereke</title>
    <style>
        body { 
            background: #001B5C; 
            color: #e0c9a6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            margin-top: 50px; 
            position: relative; 
            display: inline-block;
        }
        canvas { 
            border: 12px solid #5d4037; 
            border-radius: 50%; 
            box-shadow: 0 0 25px rgba(0,0,0,0.7); 
            background: #3e2723; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1);
        }
        
        .pointer {
            position: absolute;
            top: 50%;
            right: -30px;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 50px solid #d4af37;
            z-index: 10;
        }

        button { 
            background: #8b5a2b; 
            border: 2px solid #d4af37; 
            color: #f2e3c9; 
            padding: 15px 30px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-top: 25px; 
            transition: 0.3s; 
            text-shadow: 1px 1px 2px black;
        }
        button:hover { 
            background: #d4af37; 
            color: #1a0f0a; 
            transform: scale(1.08); 
        }
        button:disabled { 
            background: #555; 
            border-color: #777; 
            cursor: not-allowed; 
        }
        input { 
            padding: 12px; 
            border-radius: 5px; 
            border: 2px solid #5d4037; 
            background: #3e2723; 
            color: #f2e3c9; 
            margin-bottom: 15px; 
            width: 250px; 
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>🎡 BeGombázók kereke</h1>
    <p>Vitéz! Írd be a neved, és pörgess a napi jutalmadért!</p>
    
    <input type="text" id="username" placeholder="Discord neved..."><br>
    
    <div class="container">
        <div class="pointer"></div> 
        <canvas id="wheel" width="450" height="450"></canvas>
    </div>

    <br>
    <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    <p id="result" style="font-size: 24px; font-weight: bold; margin-top: 20px;"></p>

    <script>
        const prizes = ["🍄 5 Gomba", "💰 1000 Arany", "💀 Balszerencse", "🍄 10 Gomba", "🛡️ Új Rang", "🍻 Egy sör", "💎 Drágakő", "⚔️ Fegyver"];
        const colors = ["#8d6e63", "#5d4037", "#a1887f", "#4e342e", "#8d6e63", "#5d4037", "#a1887f", "#4e342e"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let currentRotation = 0;

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc);
                ctx.fill();
                
                ctx.strokeStyle = "#d4af37";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "white";
                ctx.font = "bold 15px Segoe UI";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "black";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";

                ctx.translate(225, 225);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(prizes[i], 215, 0); 
                ctx.restore();
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value;
            if (!user) return alert("Add meg a neved, vitéz!");
            // Ha a név 'teszt', akkor nem nézi a napi korlátot
            if (user.toLowerCase() !== "teszt") {
                if (localStorage.getItem("lastSpin") === new Date().toDateString()) {
                    return alert("Ma már pörgettél! Gyere vissza holnap.");
                }
            }
            // ------------------------

            if (localStorage.getItem("lastSpin") === new Date().toDateString()) {
                return alert("Ma már pörgettél! Gyere vissza holnap.");
            }

            const spinBtn = document.getElementById("spinBtn");
            spinBtn.disabled = true;
            
            const spinDeg = Math.floor(Math.random() * 360) + 3600; 
            currentRotation += spinDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDeg = currentRotation % 360;
                // A mutató jobbra van (0 fok), de a logikánk szerint korrigálni kell
                const prizeIndex = Math.floor(((360 - (actualDeg % 360)) / (360 / prizes.length))) % prizes.length;
                const winnerPrize = prizes[prizeIndex];
                
                document.getElementById("result").innerText = "Nyereményed: " + winnerPrize;
                localStorage.setItem("lastSpin", new Date().toDateString());
                
                sendToDiscord(user, winnerPrize);
                spinBtn.disabled = false;
            }, 5000);
        }

function sendToDiscord(user, prize) {
    const webhookURL = "https://discord.com/api/webhooks/1477720960827130159/k3Pi8AiXOpDuUAJi4FJhNr6KtBANTbDV9-nzarCXVYB9dnGwtxu9E9zy15uJNgzcPdJP"; 
    
    fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            content: `🎡 **${user}** pörgetett és nyert: **${prize}**!`
        })
    }).then(response => {
        console.log("Discord üzenet elküldve!");
    }).catch(error => {
        console.error("Hiba történt:", error);
    });
}

        // Betöltéskor rajzolás
        window.onload = drawWheel;
    </script>
</body>
</html>
