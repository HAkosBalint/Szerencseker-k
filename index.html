<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Abul-Akbar Szerencsekereke</title>
    <style>
        body { 
            background: #001B5C; 
            color: #e0c9a6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px; overflow-x: hidden;
        }

        .guild-logo {
            position: absolute; top: 10px; right: 10px;
            width: 150px; height: auto; z-index: 100;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }

        .container { margin-top: 50px; position: relative; display: inline-block; }

        canvas { 
            border: 12px solid #5d4037; border-radius: 50%; 
            box-shadow: 0 0 25px rgba(0,0,0,0.7); background: #3e2723; 
            display: block; margin: 0 auto;
            /* Alap lassú forgás */
            animation: slow-spin 30s linear infinite;
        }

        @keyframes slow-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning {
            animation: none !important;
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1) !important;
        }

        .pointer {
            position: absolute; top: 50%; right: -30px; transform: translateY(-50%);
            width: 0; height: 0; border-top: 25px solid transparent;
            border-bottom: 25px solid transparent; border-right: 50px solid #d4af37; z-index: 10;
        }

        button { 
            background: #8b5a2b; border: 2px solid #d4af37; color: #f2e3c9; 
            padding: 15px 30px; font-size: 22px; font-weight: bold; cursor: pointer; 
            border-radius: 8px; margin-top: 25px; transition: 0.3s; text-shadow: 1px 1px 2px black;
        }
        button:hover { background: #d4af37; color: #1a0f0a; transform: scale(1.08); }
        button:disabled { background: #555; border-color: #777; cursor: not-allowed; }

        input { 
            padding: 12px; border-radius: 5px; border: 2px solid #5d4037; 
            background: #3e2723; color: #f2e3c9; margin-bottom: 15px; width: 250px; font-size: 16px;
        }

        #prizeModal {
            display: none; position: fixed; z-index: 200; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #3e2723; color: #f2e3c9; margin: 10% auto; padding: 40px; 
            border: 4px solid #d4af37; width: 320px; border-radius: 20px; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5); text-align: center;
        }
        .close-btn { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <img src="Screenshot_20260227_124403.jpg" class="guild-logo" alt="BeGombázók Logó">

    <audio id="clickSound" src="https://www.soundjay.com/communication/pokes-1.mp3" preload="auto"></audio>

    <div id="prizeModal">
        <div class="modal-content">
            <h2>Gratulálok!</h2>
            <p id="modalPrizeText"></p>
            <button class="close-btn" onclick="closeModal()">RENDBEN</button>
        </div>
    </div>

    <h1>🎡 BeGombázók kereke</h1>
    <p>Vitéz! Írd be a neved, és pörgess a napi jutalmadért!</p>
    
    <input type="text" id="username" placeholder="Discord neved..."><br>
    
    <div class="container">
        <div class="pointer"></div> 
        <canvas id="wheel" width="450" height="450"></canvas>
    </div>

    <br>
    <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>

    <script>
        const prizes = ["🍄 5 Gomba", "💰 1000 Arany", "💀 Balszerencse", "🍄 10 Gomba", "🛡️ Új Rang", "🍻 Egy sör", "💎 Drágakő", "⚔️ Fegyver"];
        const colors = ["#8d6e63", "#5d4037", "#a1887f", "#4e342e", "#8d6e63", "#5d4037", "#a1887f", "#4e342e"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const clickSound = document.getElementById("clickSound");
        let currentRotation = 0;
        let lastPrizeIndex = -1;

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.strokeStyle = "#d4af37";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.save();
                ctx.fillStyle = "white";
                ctx.font = "bold 15px Segoe UI";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.translate(225, 225);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(prizes[i], 215, 0); 
                ctx.restore();
            }
            // Középrész
            ctx.beginPath();
            ctx.arc(225, 225, 40, 0, 2 * Math.PI);
            ctx.fillStyle = "#5d4037";
            ctx.fill();
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        // Hang lejátszása klónozással a biztosabb működésért
        function playClick() {
            if (clickSound) {
                const soundClone = clickSound.cloneNode();
                soundClone.volume = 0.4;
                soundClone.play().catch(() => {});
            }
        }

        function checkRotation() {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            const adjustedAngle = (angle < 0 ? angle + 360 : angle);
            const prizeIndex = Math.floor(((360 - adjustedAngle) / (360 / prizes.length))) % prizes.length;

            if (prizeIndex !== lastPrizeIndex) {
                playClick();
                lastPrizeIndex = prizeIndex;
            }
            if (canvas.classList.contains("spinning")) {
                requestAnimationFrame(checkRotation);
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Add meg a neved, vitéz!");
            if (user.toLowerCase() !== "teszt") {
                if (localStorage.getItem("lastSpin") === new Date().toDateString()) {
                    return alert("Ma már pörgettél! Gyere vissza holnap.");
                }
            }

            const spinBtn = document.getElementById("spinBtn");
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
            
            spinBtn.disabled = true;
            canvas.style.animation = "none";
            canvas.style.transform = `rotate(${currentAngle}deg)`;
            void canvas.offsetWidth; 

            setTimeout(() => {
                canvas.classList.add("spinning");
                requestAnimationFrame(checkRotation);
                const spinDeg = Math.floor(Math.random() * 360) + 3600; 
                currentRotation = currentAngle + spinDeg;
                canvas.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    const finalStyle = window.getComputedStyle(canvas);
                    const finalMatrix = new WebKitCSSMatrix(finalStyle.transform);
                    const finalAngle = Math.atan2(finalMatrix.b, finalMatrix.a) * (180 / Math.PI);
                    const adjustedFinalAngle = (finalAngle < 0 ? finalAngle + 360 : finalAngle);
                    const prizeIndex = Math.floor(((360 - (adjustedFinalAngle % 360)) / (360 / prizes.length))) % prizes.length;
                    const winnerPrize = prizes[prizeIndex];
                    
                    document.getElementById("modalPrizeText").innerText = winnerPrize;
                    document.getElementById("prizeModal").style.display = "block";
                    
                    if (user.toLowerCase() !== "teszt") {
                        localStorage.setItem("lastSpin", new Date().toDateString());
                    }
                    sendToDiscord(user, winnerPrize);
                    sendToGoogleSheet(user, winnerPrize);
                    spinBtn.disabled = false;
                }, 5000);
            }, 10);
        }

        function closeModal() {
            document.getElementById("prizeModal").style.display = "none";
            canvas.classList.remove("spinning");
            canvas.style.transform = ""; 
            void canvas.offsetWidth;
            canvas.style.animation = "slow-spin 30s linear infinite";
        }

        function sendToDiscord(user, prize) {
            const webhookURL = "https://discord.com/api/webhooks/1477720960827130159/k3Pi8AiXOpDuUAJi4FJhNr6KtBANTbDV9-nzarCXVYB9dnGwtxu9E9zy15uJNgzcPdJP"; 
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `🎰 **${user}** pörgetett és nyert: **${prize}**!` })
            });
        }

        // Javított Google Sheets beküldés a kért ID-val
        function sendToGoogleSheet(user, prize) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const formData = new FormData();
            formData.append("entry.1569039722", user); 
            formData.append("entry.916111113", prize); 
            fetch(formURL, { method: "POST", mode: "no-cors", body: formData });
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
