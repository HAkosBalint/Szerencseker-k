<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Abul-Akbar Szerencsekereke</title>
    <style>
        body { 
            background: #001B5C; 
            color: #e0c9a6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            margin-top: 50px; 
            position: relative; 
            display: inline-block; /* A mutató miatt fontos */
        }
        canvas { 
            border: 12px solid #5d4037; 
            border-radius: 50%; 
            box-shadow: 0 0 25px rgba(0,0,0,0.7); 
            background: #3e2723; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1); /* Lassabb, drámaibb megállás */
        }
        
        /* A JOBB OLDALI MUTATÓ NYÍL */
        .pointer {
            position: absolute;
            top: 50%;
            right: -30px; /* A keréktől jobbra */
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 50px solid #d4af37; /* Arany színű nyíl */
            z-index: 10;
        }

        button { 
            background: #8b5a2b; 
            border: 2px solid #d4af37; 
            color: #f2e3c9; 
            padding: 15px 30px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-top: 25px; 
            transition: 0.3s; 
            text-shadow: 1px 1px 2px black;
        }
        button:hover { 
            background: #d4af37; 
            color: #1a0f0a; 
            transform: scale(1.08); 
        }
        button:disabled { 
            background: #555; 
            border-color: #777; 
            cursor: not-allowed; 
        }
        input { 
            padding: 12px; 
            border-radius: 5px; 
            border: 2px solid #5d4037; 
            background: #3e2723; 
            color: #f2e3c9; 
            margin-bottom: 15px; 
            width: 250px; 
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>🎡 BeGombázók kereke</h1>
    <p>Vitéz! Írd be a neved, és pörgess a napi jutalmadért!</p>
    
    <input type="text" id="username" placeholder="Discord neved..."><br>
    
    <div class="container">
        <div class="pointer"></div> <canvas id="wheel" width="450" height="450"></canvas>
    </div>

    <br>
    <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    <p id="result" style="font-size: 24px; font-weight: bold; margin-top: 20px;"></p>

    <script>
        const prizes = ["🍄 5", "💰 1000", "💀", "🍄 10", "🛡️ Új Rang", "🍻", "💎", "⚔️"];
        const colors = ["#8d6e63", "#5d4037", "#3e2723", "#8d6e63", "#5d4037", "#3e2723", "#8d6e63", "#5d4037"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let currentRotation = 0;


      function drawWheel() {
    const arc = (2 * Math.PI) / prizes.length;
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Tisztítás, hogy ne ragadjon be semmi

    for (let i = 0; i < prizes.length; i++) {
        // SZELETEK SZÍNEZÉSE (Váltakozó barna árnyalatok)
        ctx.fillStyle = (i % 2 === 0) ? "#5d4037" : "#3e2723"; 
        ctx.beginPath();
        ctx.moveTo(225, 225);
        ctx.arc(225, 225, 225, i * arc, (i + 1) * arc);
        ctx.fill();
        
        // SZELETEK KÖZÖTTI VONALAK (Arany szín)
        ctx.strokeStyle = "#d4af37";
        ctx.lineWidth = 2;
        ctx.stroke();

        // SZÖVEGEK RAJZOLÁSA
        ctx.save();
        ctx.fillStyle = "#f2e3c9"; // Világos pergamen szín a szövegnek
        ctx.font = "bold 14px Segoe UI";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";

        // Mozgatás a szelet közepére
        ctx.translate(225, 225);
        ctx.rotate(i * arc + arc / 2);
        
        // A szöveget beljebb toljuk, hogy elférjen (180 pixelre a középponttól)
        ctx.fillText(prizes[i], 210, 0); 
        ctx.restore();
    }
}

// EZT NE FELEJTSD EL: A kód végén a drawWheel() hívás után 
// érdemes ezt is odaírni, hogy betöltéskor azonnal megjelenjen:
window.onload = drawWheel;
        
        function sendToDiscord(user, prize) {
            const webhookURL = https://discord.com/api/webhooks/1477699408836558911/bbEnuI5QRGdLz8InshqUvWHfrYN3HL7WkY6m1yfGKOUhOQB2iT1eTMGj7WjO6Oq-_bSR; // <-- NE FELEJTSD EL!
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🎰 **${user}** pörgetett és nyert: **${prize}**!`
                })
            });
        }
        drawWheel();
    </script>
</body>
</html>
