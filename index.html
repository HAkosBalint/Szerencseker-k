<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szerencsekerék</title>
    <style>
        body { background: #1a0f0a; color: #f2e3c9; font-family: 'Times New Roman', serif; text-align: center; }
        .main-container { background: #dcc296; display: inline-block; padding: 40px; border-radius: 15px; border: 2px solid #5d4037; margin-top: 50px; box-shadow: 0 0 50px #000; }
        .container { position: relative; display: inline-block; }
        
        #wheel { border: 12px solid #3e2723; border-radius: 50%; display: block; }
        /* Alap lassú forgás */
        .idle-animation { animation: slow-spin 30s linear infinite; }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pointer { position: absolute; top: 50%; right: -30px; transform: translateY(-50%); width: 0; height: 0; 
                   border-top: 25px solid transparent; border-bottom: 25px solid transparent; border-right: 55px solid #d4af37; z-index: 10; }

        button { background: linear-gradient(to bottom, #8b5a2b 0%, #4e342e 100%); border: 3px solid #d4af37; color: #f2e3c9; 
                 padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 20px; }
        
        /* Modal ablak */
        #customModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #dcc296; margin: 15% auto; padding: 30px; border: 5px solid #5d4037; width: 350px; border-radius: 15px; color: #3e2723; }
        .prize-name { font-size: 2.5em; font-weight: bold; color: #8b0000; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Szerencsekerék</h1>
        <input type="text" id="username" placeholder="Hős neve..." style="padding:12px; text-align:center; width:250px; font-size:18px;"><br>
        <div class="container">
            <div class="pointer"></div> 
            <canvas id="wheel" class="idle-animation" width="450" height="450"></canvas>
        </div><br>
        <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    </div>

    <div id="customModal">
        <div class="modal-content">
            <h2>Gratulálunk!</h2>
            <p>A sorsod mára:</p>
            <div id="prizeText" class="prize-name"></div>
            <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer; font-weight:bold;">RENDBEN</button>
        </div>
    </div>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <script>
        const prizes = ["5 Gomba", "1000 Arany", "Balszerencse", "10 Gomba", "Új Rang", "Egy sör", "Drágakő", "Fegyver"];
        const colors = ["#5d4037", "#8b5a2b", "#3e2723", "#d4af37", "#5d4037", "#8b0000", "#3e2723", "#a67b5b"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.fillStyle = "#fff"; ctx.font = "bold 16px serif"; ctx.textAlign = "right";
                ctx.translate(225, 225); ctx.rotate(i * arc + arc / 2); ctx.fillText(prizes[i], 210, 5); ctx.restore();
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Hősöm, add meg a neved!");

            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            // Alapforgás megállítása, hogy ne rángasson
            canvas.classList.remove("idle-animation");
            
            const randomRotation = 3600 + Math.floor(Math.random() * 360);
            canvas.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.1, 1)";
            canvas.style.transform = `rotate(${randomRotation}deg)`;

            setTimeout(() => {
                const finalDeg = randomRotation % 360;
                const idx = Math.floor(((360 - finalDeg) / (360 / prizes.length))) % prizes.length;
                const win = prizes[idx];
                
                document.getElementById("prizeText").innerText = win;
                document.getElementById("customModal").style.display = "block";
                
                // Összefűzzük: Név + Nyeremény
                const combinedData = user + " - " + win;
                sendToForm(combinedData);
            }, 5000);
        }

        function sendToForm(data) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const form = document.createElement("form");
            form.target = "hidden_iframe"; form.method = "POST"; form.action = formURL;
            
            // Csak az entry.1569039722-t küldjük (ebben lesz benne a név és a nyeremény is)
            const input = document.createElement("input"); 
            input.type = "hidden"; 
            input.name = "entry.1569039722"; 
            input.value = data; 
            form.appendChild(input);
            
            document.body.appendChild(form); 
            form.submit();
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
