<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szerencsekerék - Discord</title>
    <style>
        /* Sötét fa háttér az egész oldalnak */
        body { 
            background: #1a0f0a url('https://www.transparenttextures.com/patterns/dark-wood.png'); 
            color: #f2e3c9; font-family: 'Times New Roman', serif; text-align: center; margin: 0; padding: 20px;
        }

        /* A kerék mögötti rész: egy tiszta, elegáns pergamen */
        .main-container {
            background: #dcc296 url('https://i.imgur.com/8S9p38n.png') no-repeat center center;
            background-size: 100% 100%;
            display: inline-block;
            padding: 80px 100px;
            position: relative;
            min-width: 550px;
            color: #3e2723;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.9));
        }

        .container { position: relative; display: inline-block; margin: 20px 0; }
        
        /* Fa kerék stílus */
        canvas { 
            border: 12px solid #3e2723; border-radius: 50%; background: #4e342e;
            animation: slow-spin 40s linear infinite;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning-active { animation: none !important; transition: transform 5s cubic-bezier(0.1, 0, 0.15, 1) !important; }

        .pointer {
            position: absolute; top: 50%; right: -35px; transform: translateY(-50%);
            width: 0; height: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; 
            border-right: 50px solid #d4af37; z-index: 10;
        }

        /* Gomb és beviteli mező stílus */
        button { 
            background: linear-gradient(to bottom, #8b5a2b 0%, #4e342e 100%); border: 3px solid #d4af37; 
            color: #f2e3c9; padding: 12px 40px; font-size: 22px; font-weight: bold; cursor: pointer; 
            border-radius: 5px; text-shadow: 2px 2px 2px #000; box-shadow: 0 4px 0 #2e1a12;
            margin-top: 15px;
        }
        button:disabled { filter: grayscale(1); }

        input { 
            background: rgba(255, 255, 255, 0.6); border: 2px solid #5d4037; 
            padding: 10px; font-size: 18px; width: 280px; margin-bottom: 10px; 
            text-align: center; font-weight: bold;
        }
        
        #prizeModal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #dcc296; margin: 15% auto; padding: 40px; border: 8px solid #5d4037; width: 300px; text-align: center; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 style="font-variant: small-caps; margin: 0;">Szerencsekerék</h1>
        <p style="margin-bottom: 5px;">Írd be a Discord neved!</p>
        <input type="text" id="username" placeholder="Discord név..." autocomplete="off"><br>
        
        <div class="container">
            <div class="pointer"></div> 
            <canvas id="wheel" width="460" height="460"></canvas>
        </div><br>
        
        <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    </div>

    <div id="prizeModal">
        <div class="modal-content">
            <h2 style="color:#5d4037">Gratulálunk!</h2>
            <p id="modalPrizeText" style="font-size: 28px; font-weight: bold; color: #8b0000;"></p>
            <button onclick="closeModal()">RENDBEN</button>
        </div>
    </div>

    <script>
        const prizes = ["5 Gomba", "1000 Arany", "Balszerencse", "10 Gomba", "Új Rang", "Egy sör", "Drágakő", "Fegyver"];
        const colors = ["#5d4037", "#8b5a2b", "#3e2723", "#d4af37", "#5d4037", "#8b0000", "#3e2723", "#a67b5b"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(230, 230);
                ctx.arc(230, 230, 230, i * arc, (i + 1) * arc);
                ctx.fill();
                
                // Deszka textúra
                ctx.save();
                ctx.strokeStyle = "rgba(0,0,0,0.2)";
                ctx.lineWidth = 2;
                ctx.translate(230, 230);
                ctx.rotate(i * arc);
                ctx.beginPath();
                ctx.moveTo(0,0); ctx.lineTo(230,0);
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px serif";
                ctx.textAlign = "right";
                ctx.translate(230, 230);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(prizes[i], 215, 5);
                ctx.restore();
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Kérlek, add meg a Discord neved!");
            
            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180/Math.PI));
            
            canvas.classList.add("spinning-active");
            const rotation = Math.floor(Math.random() * 360) + 3600;
            const finalAngle = rotation + (currentAngle < 0 ? currentAngle + 360 : currentAngle);
            
            canvas.style.transform = `rotate(${finalAngle}deg)`;

            setTimeout(() => {
                const actualDeg = finalAngle % 360;
                const idx = Math.floor(((360 - actualDeg) / (360 / prizes.length))) % prizes.length;
                const win = prizes[idx];
                
                document.getElementById("modalPrizeText").innerText = win;
                document.getElementById("prizeModal").style.display = "block";
                
                sendToGoogleSheet(user, win);
                btn.disabled = false;
            }, 5000);
        }

        function sendToGoogleSheet(user, prize) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const iframe = document.createElement("iframe");
            iframe.name = "hidden_frame"; iframe.style.display = "none";
            document.body.appendChild(iframe);
            const form = document.createElement("form");
            form.target = "hidden_frame"; form.method = "POST"; form.action = formURL;
            
            // Mező azonosítók
            const n = document.createElement("input"); n.type="hidden"; n.name = "entry.1569039722"; n.value = user; form.appendChild(n);
            const p = document.createElement("input"); p.type="hidden"; p.name = "entry.916111113"; p.value = prize; form.appendChild(p);
            
            document.body.appendChild(form);
            form.submit();
        }

        function closeModal() {
            document.getElementById("prizeModal").style.display = "none";
            canvas.classList.remove("spinning-active");
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
