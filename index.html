<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szerencsekerék - Discord</title>
    <style>
        body { 
            background: #1a0f0a; color: #f2e3c9; 
            font-family: 'Times New Roman', serif; text-align: center; padding: 20px;
        }

        .main-container {
            background: #dcc296; display: inline-block; padding: 40px 60px;
            border-radius: 10px; color: #3e2723; border: 2px solid #5d4037;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .container { position: relative; display: inline-block; margin: 20px 0; }
        
        /* ALAPFORGÁS - külön div-en, hogy ne zavarja a pörgetést */
        #wheel { 
            border: 12px solid #3e2723; border-radius: 50%; background: #4e342e;
            display: block;
        }

        /* Ez az osztály felel az alap lassú forgásért */
        .idle-animation {
            animation: slow-spin 30s linear infinite;
        }

        @keyframes slow-spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* Pörgetéskor ezt használjuk */
        .fast-spin {
            animation: none !important;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1) !important;
        }

        .pointer {
            position: absolute; top: 50%; right: -30px; transform: translateY(-50%);
            width: 0; height: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; 
            border-right: 55px solid #d4af37; z-index: 10;
        }

        button { 
            background: linear-gradient(to bottom, #8b5a2b 0%, #4e342e 100%); 
            border: 3px solid #d4af37; color: #f2e3c9; padding: 15px 45px; 
            font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 8px;
            text-shadow: 2px 2px 2px #000; margin-top: 20px;
        }
        button:disabled { opacity: 0.6; }

        input { 
            padding: 12px; width: 280px; text-align: center; font-size: 18px; 
            border: 2px solid #5d4037; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Szerencsekerék</h1>
        <input type="text" id="username" placeholder="Discord neved..." autocomplete="off"><br>
        
        <div class="container">
            <div class="pointer"></div> 
            <canvas id="wheel" class="idle-animation" width="450" height="450"></canvas>
        </div><br>
        
        <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS!</button>
    </div>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <script>
        const prizes = ["5 Gomba", "1000 Arany", "Balszerencse", "10 Gomba", "Új Rang", "Egy sör", "Drágakő", "Fegyver"];
        const colors = ["#5d4037", "#8b5a2b", "#3e2723", "#d4af37", "#5d4037", "#8b0000", "#3e2723", "#a67b5b"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.fillStyle = "#fff"; ctx.font = "bold 17px serif";
                ctx.textAlign = "right"; ctx.translate(225, 225);
                ctx.rotate(i * arc + arc / 2); ctx.fillText(prizes[i], 215, 6);
                ctx.restore();
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Add meg a neved!");

            const today = new Date().toISOString().slice(0, 10);
            if (localStorage.getItem("spin_" + user.toLowerCase()) === today) {
                return alert("Vitéz! Ma már pörgettél.");
            }

            const btn = document.getElementById("spinBtn");
            btn.disabled = true;

            // 1. MEGÁLLÍTJUK AZ ALAPFORGÁST OTT AHOL VAN
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentAngle = Math.round(Math.atan2(matrix.b, matrix.a) * (180/Math.PI));
            
            canvas.classList.remove("idle-animation");
            canvas.style.transform = `rotate(${currentAngle}deg)`;

            // 2. KIS SZÜNET UTÁN INDÍTJUK A PÖRGETÉST (hogy a böngésző észlelje a váltást)
            setTimeout(() => {
                canvas.classList.add("fast-spin");
                const randomExtra = Math.floor(Math.random() * 360);
                const totalRotation = currentAngle + 3600 + randomExtra;
                canvas.style.transform = `rotate(${totalRotation}deg)`;

                setTimeout(() => {
                    // 3. PONTOS KISZÁMÍTÁS (0 fok a pointer iránya)
                    const finalDeg = totalRotation % 360;
                    const sectionAngle = 360 / prizes.length;
                    // Korrekció: a pointer 0 foknál van, a kerék rajzolása az óramutató járása szerint történik
                    const correctedDeg = (360 - (finalDeg < 0 ? finalDeg + 360 : finalDeg)) % 360;
                    const idx = Math.floor(correctedDeg / sectionAngle);
                    const win = prizes[idx];
                    
                    alert("A nyereményed: " + win);
                    localStorage.setItem("spin_" + user.toLowerCase(), today);
                    
                    // BEKÜLDÉS
                    sendToForm(user, win);
                    btn.disabled = false;
                }, 5100);
            }, 50);
        }

        function sendToForm(user, prize) {
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            const form = document.createElement("form");
            form.target = "hidden_iframe"; form.method = "POST"; form.action = formURL;
            
            const n = document.createElement("input"); n.type="hidden"; n.name="entry.1569039722"; n.value=user; form.appendChild(n);
            const p = document.createElement("input"); p.type="hidden"; p.name="entry.916111113"; p.value=prize; form.appendChild(p);
            
            document.body.appendChild(form);
            form.submit();
            setTimeout(() => document.body.removeChild(form), 1000);
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
