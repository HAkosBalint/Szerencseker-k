<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Abul-Akbar Szerencsekereke</title>
    <style>
        body { 
            background: #001B5C; 
            color: #e0c9a6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .container { 
            margin-top: 50px; 
            position: relative; 
            display: inline-block;
        }
        canvas { 
            border: 12px solid #5d4037; 
            border-radius: 50%; 
            box-shadow: 0 0 25px rgba(0,0,0,0.7); 
            background: #3e2723; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1);
        }
        
        .pointer {
            position: absolute;
            top: 50%;
            right: -30px;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 50px solid #d4af37;
            z-index: 10;
        }

        button { 
            background: #8b5a2b; 
            border: 2px solid #d4af37; 
            color: #f2e3c9; 
            padding: 15px 30px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-top: 25px; 
            transition: 0.3s; 
            text-shadow: 1px 1px 2px black;
        }
        button:hover { 
            background: #d4af37; 
            color: #1a0f0a; 
            transform: scale(1.08); 
        }
        button:disabled { 
            background: #555; 
            border-color: #777; 
            cursor: not-allowed; 
        }
        input { 
            padding: 12px; 
            border-radius: 5px; 
            border: 2px solid #5d4037; 
            background: #3e2723; 
            color: #f2e3c9; 
            margin-bottom: 15px; 
            width: 250px; 
            font-size: 16px;
        }

        /* --- MODAL STÍLUSOK --- */
        #prizeModal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #3e2723; 
            color: #f2e3c9; 
            margin: 10% auto; 
            padding: 40px; 
            border: 4px solid #d4af37; 
            width: 320px; 
            border-radius: 20px; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5); 
            text-align: center;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 { color: #d4af37; margin-top: 0; font-size: 28px; }
        .modal-content p { font-size: 24px; font-weight: bold; margin: 20px 0; }
        .close-btn { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="prizeModal">
        <div class="modal-content">
            <h2>Gratulálok!</h2>
            <p id="modalPrizeText"></p>
            <button class="close-btn" onclick="closeModal()">RENDBEN</button>
        </div>
    </div>

    <h1>🎡 BeGombázók kereke</h1>
    <p>Vitéz! Írd be a neved, és pörgess a napi jutalmadért!</p>
    
    <input type="text" id="username" placeholder="Discord neved..."><br>
    
    <div class="container">
        <div class="pointer"></div> 
        <canvas id="wheel" width="450" height="450"></canvas>
    </div>

    <br>
    <button id="spinBtn" onclick="spinWheel()">PÖRGETÉS</button>
    <p id="result" style="display: none;"></p>

    <script>
        const prizes = ["🍄 5 Gomba", "💰 1000 Arany", "💀 Balszerencse", "🍄 10 Gomba", "🛡️ Új Rang", "🍻 Egy sör", "💎 Drágakő", "⚔️ Fegyver"];
        const colors = ["#8d6e63", "#5d4037", "#a1887f", "#4e342e", "#8d6e63", "#5d4037", "#a1887f", "#4e342e"];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        let currentRotation = 0;

        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc);
                ctx.fill();
                
                ctx.strokeStyle = "#d4af37";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "white";
                ctx.font = "bold 15px Segoe UI";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "black";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";

                ctx.translate(225, 225);
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(prizes[i], 215, 0); 
                ctx.restore();
            }
        }

        function spinWheel() {
            const user = document.getElementById("username").value.trim();
            if (!user) return alert("Add meg a neved, vitéz!");

            // Napi korlát és 'teszt' kiskapu
            if (user.toLowerCase() !== "teszt") {
                if (localStorage.getItem("lastSpin") === new Date().toDateString()) {
                    return alert("Ma már pörgettél! Gyere vissza holnap.");
                }
            }

            const spinBtn = document.getElementById("spinBtn");
            spinBtn.disabled = true;
            
            const spinDeg = Math.floor(Math.random() * 360) + 3600; 
            currentRotation += spinDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDeg = currentRotation % 360;
                const prizeIndex = Math.floor(((360 - (actualDeg % 360)) / (360 / prizes.length))) % prizes.length;
                const winnerPrize = prizes[prizeIndex];
                
                // --- MODAL MEGJELENÍTÉSE ---
                document.getElementById("modalPrizeText").innerText = winnerPrize;
                document.getElementById("prizeModal").style.display = "block";
                
                // Adat mentése (csak ha nem teszt)
                if (user.toLowerCase() !== "teszt") {
                    localStorage.setItem("lastSpin", new Date().toDateString());
                }
                
                sendToDiscord(user, winnerPrize);
                sendToGoogleSheet(user, winnerPrize); // Ez küldi a táblázatba is
                spinBtn.disabled = false;
            }, 5000);
        }

        function closeModal() {
            document.getElementById("prizeModal").style.display = "none";
        }

        function sendToDiscord(user, prize) {
            const webhookURL = "https://discord.com/api/webhooks/1477720960827130159/k3Pi8AiXOpDuUAJi4FJhNr6KtBANTbDV9-nzarCXVYB9dnGwtxu9E9zy15uJNgzcPdJP"; 
            
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🎰 **${user}** pörgetett és nyert: **${prize}**!`
                })
            }).then(response => {
                console.log("Discord üzenet elküldve!");
            }).catch(error => {
                console.error("Hiba történt:", error);
            });
        }
        function sendToGoogleSheet(user, prize) {
            // 1. JAVÍTÁS: A link vége formResponse legyen!
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSefkJTHSp1QD_5owpuv3MoQ9OrFa1kA4T5h-ykElffufGpWsA/formResponse";
            
            const formData = new FormData();
            
            // 2. JAVÍTÁS: Itt a 0 és 2 helyére a saját entry számaidat írd be!
            // Ezeket a Form forráskódjában találod (Ctrl+F-el keress rá: "entry.")
            formData.append("entry.entry.1569039722", user); 
            formData.append("entry.entry.1105994344", prize); 
        
            fetch(formURL, {
                method: "POST",
                mode: "no-cors", 
                body: formData
            }).then(() => {
                console.log("Sikeresen elküldve a Google-nek!");
            }).catch((error) => {
                console.error("Hiba:", error);
            });
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
